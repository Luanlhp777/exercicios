<meta charset="utf-8">

<script>

  // Elaborar um programa para uma pizzaria, o qual leia o valor total de uma conta e quantos clientes vão pagá-la. Calcule e informe o valor a ser pago por cliente.
  // Elabore também o valor pago pela sobremesa e depois o preço total da conta.

  var conta = Number(prompt("Valor da Conta R$: "));                      // Lê os dados de entrada.
  var sobremesa = Number(prompt("Valor da sobremesa R$: "));
  var numCliente = Number(prompt("Número de Clientes: "));

  var total = conta + sobremesa;                                          // Calcula o valor total.

  var individual = (conta + sobremesa) / numCliente;                      // Calcula o valor individual por cliente.

  alert("Valor total: " + total.toFixed(2) + "\nValor por Cliente R$: " + individual.toFixed(2));                // Exibe a resposta (com 2 casas decimais no valor).

</script>
