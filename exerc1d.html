<meta charset="utf-8">

<script>

  var nota1 = Number(prompt("1ª Nota: "));
  var nota2 = Number(prompt("2ª Nota: "));                // Lê as notas do aluno.
  var nota3 = Number(prompt("3ª Nota: "));
  var nota4 = Number(prompt("4ª Nota: "));

  var media = (nota1 + nota2 + nota3 + nota4) / 4;        // Calcula a média das notas.

  alert("Média: " + media.toFixed(1));                    // Exibe a média das notas.

</script>
