<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 2 - Desconto no Produto</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: #111827;
            color: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .caixa {
            width: 100%;
            max-width: 420px;
            background: #1f2937;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            color: #d1d5db;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input,
        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            margin-bottom: 14px;
        }

        input {
            background: #f9fafb;
            color: #111827;
        }

        button {
            background: #38bdf8;
            color: #082f49;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #7dd3fc;
        }

        .resultado {
            margin-top: 8px;
            padding: 16px;
            border-radius: 12px;
            background: #0f172a;
        }

        .resultado strong {
            display: block;
            font-size: 1.35rem;
            margin-bottom: 8px;
            color: #7dd3fc;
        }
    </style>
</head>

<body>
    <main class="caixa">
        <h1>Desconto no Produto</h1>
        <p>Informe o preço e o percentual para descobrir o valor final com desconto.</p>

        <label for="preco">Preco do produto</label>
        <input type="number" id="preco" placeholder="Ex: 100" step="any">

        <label for="desconto">Percentual de desconto</label>
        <input type="number" id="desconto" placeholder="Ex: 10" step="any">

        <button id="calcular">Calcular desconto</button>

        <section class="resultado">
            <strong id="resultado">Aguardando dados...</strong>
            <span id="mensagem">Digite os valores e clique no botao.</span>
        </section>
    </main>

    <script>
        const preco = document.getElementById("preco");
        const desconto = document.getElementById("desconto");
        const resultado = document.getElementById("resultado");
        const mensagem = document.getElementById("mensagem");
        const botao = document.getElementById("calcular");

        function calcularDesconto() {
            const valorProduto = Number(preco.value);
            const percentual = Number(desconto.value);

            if (preco.value === "" || desconto.value === "" || Number.isNaN(valorProduto) || Number.isNaN(percentual)) {
                resultado.textContent = "Aguardando dados...";
                mensagem.textContent = "Preencha os dois campos com valores validos.";
                return;
            }

            const valorDesconto = (valorProduto * percentual) / 100;
            const precoFinal = valorProduto - valorDesconto;

            resultado.textContent = "R$ " + precoFinal.toFixed(2);
            mensagem.textContent = "Desconto de R$ " + valorDesconto.toFixed(2) + " aplicado sobre o produto.";
        }

        botao.addEventListener("click", calcularDesconto);
    </script>
</body>

</html>
