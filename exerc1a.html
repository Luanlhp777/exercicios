<meta charset="utf-8">

<script>

  // Elaborar um programa que leia um número. Calcule e informe os seus vizinhos, ou seja, o número anterior e posterior.

  var num = Number(prompt("Número: "));                 // Lê um número

  var anterior = num - 1;                               // Calcula os vizinhos
  var posterior = num + 1;

  alert("Vizinhos: " + anterior + " e " + posterior);   // Exibi a resposta.

</script>
